<!DOCTYPE html>
<html>
<head>
    <title>Smart Spam Detection System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

    <h1>📧 Smart Spam Detection System</h1>

    <p>Enter a message and check whether it is Spam or Ham.</p>

    <form method="POST">
        <textarea
        name="message"
        placeholder="Type your message here..."></textarea>

        <br>

        <button type="submit">
            Analyze Message
        </button>
    </form>

    <h2>{{ prediction }}</h2>

</div>

</body>
</html>
